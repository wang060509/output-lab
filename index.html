<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Output Lab - Dark Cyber UI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header class="topbar" id="topbar"></header>

    <div class="notice" id="notice"></div>

    <div class="layout">
      <main class="workspace">
        <section class="panel active" id="benchmark"></section>
        <section class="panel" id="audience"></section>
        <section class="panel" id="compare"></section>
        <section class="panel" id="diagnose"></section>
        <section class="panel" id="repair"></section>
      </main>

      <aside class="sticky-rail" id="right-rail"></aside>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
